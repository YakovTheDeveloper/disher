<svg width="1em" height="1em" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00C9FF"/>
    </linearGradient>
  </defs>
  
  <!-- Фон с закругленными углами -->
  <rect width="32" height="32" rx="8" fill="url(#ocean)"/>
  
  <!-- Солнце/Луна - символ осознанности и ясности -->
  <circle cx="25" cy="7" r="2.5" fill="white" fill-opacity="0.5"/>
  
  <!-- Парусник -->
  <g transform="translate(0, 0.5)">
    <!-- Мачта -->
    <line x1="16" y1="6" x2="16" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Парус (с изгибом для ощущения ветра и движения) -->
    <path d="M16 6 C19.5 10 20.5 15 19 19.5 C18.2 20.5 17 21 16 21 L16 6 Z" fill="white" fill-opacity="0.95"/>
    
    <!-- Корпус лодки -->
    <path d="M9 22 C13 25 19 25 23 22" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>
</svg>