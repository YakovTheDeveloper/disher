<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Disher">
  <!-- Full-circle cream tile -->
  <rect width="32" height="32" rx="16" fill="#faf4e7"/>

  <!-- Plate viewed from above: two concentric rings + tiny center -->
  <g fill="none" stroke="#c79a52" stroke-linecap="round">
    <circle cx="16" cy="16" r="9"   stroke-width="1.3"/>
    <circle cx="16" cy="16" r="5.5" stroke-width="0.9" opacity="0.7"/>
    <circle cx="16" cy="16" r="0.8" fill="#c79a52"/>
  </g>
</svg>
