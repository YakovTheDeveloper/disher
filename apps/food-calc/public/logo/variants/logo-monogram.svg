<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-label="Disher monogram">
  <defs>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#fbf1d4"/>
      <stop offset="55%" stop-color="#d4ae6c"/>
      <stop offset="100%" stop-color="#8a6536"/>
    </linearGradient>
  </defs>

  <!-- Cloche shaped as a "D" -->
  <g fill="none" stroke="url(#monoGrad)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Knob -->
    <circle cx="120" cy="48" r="5.5" fill="url(#monoGrad)"/>
    <line x1="120" y1="54" x2="120" y2="74"/>
    <!-- Steam wisps -->
    <path d="M 96 38 q 6 -10 0 -22" stroke-width="3" opacity="0.55"/>
    <path d="M 144 38 q 6 -10 0 -22" stroke-width="3" opacity="0.55"/>
    <!-- D-shaped dome -->
    <path d="M 55 195
             C 55 75, 185 75, 185 195"/>
    <!-- Plate / base -->
    <line x1="45" y1="195" x2="195" y2="195"/>
    <line x1="35" y1="210" x2="205" y2="210" stroke-width="3" opacity="0.7"/>
  </g>
</svg>
