<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Disher">
  <!-- White circle tile (fully rounded) -->
  <rect width="32" height="32" rx="16" fill="#ffffff"/>

  <!-- Solid minimal cloche silhouette -->
  <g fill="#c79a52">
    <!-- Knob -->
    <circle cx="16" cy="10" r="1"/>
    <rect x="15.6" y="11" width="0.8" height="1.6" rx="0.4"/>
    <!-- Dome (half-pill) -->
    <path d="M 9 20 C 9 13.5, 23 13.5, 23 20 Z"/>
    <!-- Plate base -->
    <rect x="7" y="20.4" width="18" height="1.4" rx="0.7"/>
  </g>

  <!-- Subtle steam wisp -->
  <path d="M 16 7.5 q 1.2 -1.6 0 -3.2" stroke="#d6b27a" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.65"/>
</svg>
