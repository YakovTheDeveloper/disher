       render offline. No runtime Google Fonts request (design-consistency-plan canon). -->
  <style>
    /* Prevent FOUC: hide root until CSS modules are loaded */
    #root {
      opacity: 0;
    }

    #root.ready {
      opacity: 1;
      transition: opacity 0.15s ease;
    }
  </style>
</head>

<body>
  <div id="modal-by-label-root"></div>
  <div id="root"></div>
  <script type="module" src="/src/app/index.tsx"></script>
  <div id="modal-root"></div>
  <div id="drawer-root"></div>
</body>
