name = "disher-livestore-sync"
main = "./src/cf-worker.ts"
compatibility_date = "2024-10-28"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "WEBSOCKET_SERVER"
class_name = "WebSocketServer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WebSocketServer"]

# D1 database — create with: npx wrangler d1 create disher-livestore
# Then paste the database_id here
[[d1_databases]]
binding = "DB"
database_name = "disher-livestore"
database_id = "<PASTE_YOUR_D1_DATABASE_ID_HERE>"
